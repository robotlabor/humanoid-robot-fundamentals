site_name: Humanoid Robot Fundamentals
site_description: Robotics fundamentals, simulation, reinforcement learning, and Unitree G1 humanoid examples.
site_author: Robot Labor

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Workspace Setup: workspace_setup/index.md
  - Fundamentals: fundamentals/index.md
  - Computer Simulation: computer_simulation/index.md
  - Reinforcement Learning: reinforcement_learning/index.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
